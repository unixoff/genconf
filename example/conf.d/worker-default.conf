[program:worker-default]
command=/usr/bin/python3 /srv/app/bin/worker.py consume default
autostart=true
autorestart=true
startretries=3
startsecs=0
user=app
numprocs=1
process_name=%(program_name)s_%(process_num)02d
stderr_logfile=/srv/app/var/log/%(program_name)s_stderr.log
stderr_logfile_maxbytes=10MB
stdout_logfile=/srv/app/var/log/%(program_name)s_stdout.log
stdout_logfile_maxbytes=10MB
